<!-- ORDER NOW MODAL — included on product pages -->
<div id="order-now-modal" class="fixed inset-0 z-[120] modal-overlay hidden items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl fade-in relative overflow-y-auto max-h-[95vh]">
        <button onclick="DirectOrder.close()" class="absolute top-6 right-6 p-2 bg-white/80 backdrop-blur rounded-full hover:bg-slate-100 z-10 text-navy"><i data-lucide="x"></i></button>
        <div class="bg-navy px-10 pt-10 pb-8">
            <p class="text-[10px] font-black text-orange uppercase tracking-widest mb-1">Order Now</p>
            <h2 class="text-3xl font-black text-white">Quick Checkout</h2>
            <p class="text-slate-400 text-sm mt-1">Place your order directly — no cart needed.</p>
        </div>
        <div class="px-10 pt-6">
            <div class="bg-slate-50 rounded-2xl p-4 border-2 border-slate-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">You're ordering</p>
                        <p class="font-black text-navy text-lg" id="on-item-name">Item</p>
                    </div>
                    <span class="text-2xl font-black text-orange" id="on-item-price">₱0</span>
                </div>
            </div>
        </div>
        <div class="px-10 py-6 space-y-6">
            <div>
                <label class="block text-xs font-black text-navy uppercase tracking-widest mb-3">
                    <i data-lucide="map-pin" class="w-4 h-4 inline-block mr-1 text-orange"></i> Delivery Address
                </label>
                <textarea id="on-address-full" rows="3" placeholder="Type your full delivery address — Province, City / Municipality, Barangay, Street, House No., Landmark"
                    class="w-full px-5 py-3.5 rounded-2xl border-2 border-slate-100 focus:border-navy focus:outline-none font-bold text-navy placeholder:font-normal placeholder:text-slate-400 resize-none"></textarea>
                <select id="on-province" class="hidden">
                    <option value=""></option>
                    <optgroup label="Metro Manila (NCR)">
                        <option>Metro Manila – City of Manila</option>
                        <option>Metro Manila – Quezon City</option>
                        <option>Metro Manila – Makati</option>
                        <option>Metro Manila – Pasig</option>
                        <option>Metro Manila – Taguig</option>
                        <option>Metro Manila – Marikina</option>
                        <option>Metro Manila – Mandaluyong</option>
                        <option>Metro Manila – San Juan</option>
                        <option>Metro Manila – Caloocan</option>
                        <option>Metro Manila – Malabon</option>
                        <option>Metro Manila – Navotas</option>
                        <option>Metro Manila – Valenzuela</option>
                        <option>Metro Manila – Las Piñas</option>
                        <option>Metro Manila – Muntinlupa</option>
                        <option>Metro Manila – Parañaque</option>
                        <option>Metro Manila – Pasay</option>
                        <option>Metro Manila – Pateros</option>
                    </optgroup>
                    <optgroup label="Region I – Ilocos">
                        <option>Ilocos Norte</option>
                        <option>Ilocos Sur</option>
                        <option>La Union</option>
                        <option>Pangasinan</option>
                    </optgroup>
                    <optgroup label="Region II – Cagayan Valley">
                        <option>Batanes</option>
                        <option>Cagayan</option>
                        <option>Isabela</option>
                        <option>Nueva Vizcaya</option>
                        <option>Quirino</option>
                    </optgroup>
                    <optgroup label="Region III – Central Luzon">
                        <option>Aurora</option>
                        <option>Bataan</option>
                        <option>Bulacan</option>
                        <option>Nueva Ecija</option>
                        <option>Pampanga</option>
                        <option>Tarlac</option>
                        <option>Zambales</option>
                    </optgroup>
                    <optgroup label="Region IV-A – CALABARZON">
                        <option>Batangas</option>
                        <option>Cavite</option>
                        <option>Laguna</option>
                        <option>Quezon</option>
                        <option>Rizal</option>
                    </optgroup>
                    <optgroup label="Region IV-B – MIMAROPA">
                        <option>Marinduque</option>
                        <option>Occidental Mindoro</option>
                        <option>Oriental Mindoro</option>
                        <option>Palawan</option>
                        <option>Romblon</option>
                    </optgroup>
                    <optgroup label="Region V – Bicol">
                        <option>Albay</option>
                        <option>Camarines Norte</option>
                        <option>Camarines Sur</option>
                        <option>Catanduanes</option>
                        <option>Masbate</option>
                        <option>Sorsogon</option>
                    </optgroup>
                    <optgroup label="Region VI – Western Visayas">
                        <option>Aklan</option>
                        <option>Antique</option>
                        <option>Capiz</option>
                        <option>Guimaras</option>
                        <option>Iloilo</option>
                        <option>Negros Occidental</option>
                    </optgroup>
                    <optgroup label="Region VII – Central Visayas">
                        <option>Bohol</option>
                        <option>Cebu</option>
                        <option>Negros Oriental</option>
                        <option>Siquijor</option>
                    </optgroup>
                    <optgroup label="Region VIII – Eastern Visayas">
                        <option>Biliran</option>
                        <option>Eastern Samar</option>
                        <option>Leyte</option>
                        <option>Northern Samar</option>
                        <option>Samar</option>
                        <option>Southern Leyte</option>
                    </optgroup>
                    <optgroup label="Region IX – Zamboanga Peninsula">
                        <option>Zamboanga del Norte</option>
                        <option>Zamboanga del Sur</option>
                        <option>Zamboanga Sibugay</option>
                    </optgroup>
                    <optgroup label="Region X – Northern Mindanao">
                        <option>Bukidnon</option>
                        <option>Camiguin</option>
                        <option>Lanao del Norte</option>
                        <option>Misamis Occidental</option>
                        <option>Misamis Oriental</option>
                    </optgroup>
                    <optgroup label="Region XI – Davao">
                        <option>Davao de Oro</option>
                        <option>Davao del Norte</option>
                        <option>Davao del Sur</option>
                        <option>Davao Occidental</option>
                        <option>Davao Oriental</option>
                    </optgroup>
                    <optgroup label="Region XII – SOCCSKSARGEN">
                        <option>Cotabato</option>
                        <option>Sarangani</option>
                        <option>South Cotabato</option>
                        <option>Sultan Kudarat</option>
                    </optgroup>
                    <optgroup label="Region XIII – Caraga">
                        <option>Agusan del Norte</option>
                        <option>Agusan del Sur</option>
                        <option>Dinagat Islands</option>
                        <option>Surigao del Norte</option>
                        <option>Surigao del Sur</option>
                    </optgroup>
                    <optgroup label="CAR – Cordillera">
                        <option>Abra</option>
                        <option>Apayao</option>
                        <option>Benguet</option>
                        <option>Ifugao</option>
                        <option>Kalinga</option>
                        <option>Mountain Province</option>
                    </optgroup>
                    <optgroup label="BARMM – Bangsamoro">
                        <option>Basilan</option>
                        <option>Lanao del Sur</option>
                        <option>Maguindanao del Norte</option>
                        <option>Maguindanao del Sur</option>
                        <option>Sulu</option>
                        <option>Tawi-Tawi</option>
                    </optgroup>
                </select>
                <input type="text" id="on-address" placeholder="City / Municipality / Barangay / Street / Landmark"
                    class="w-full px-5 py-3.5 rounded-2xl border-2 border-slate-100 focus:border-navy focus:outline-none font-bold text-navy placeholder:font-normal placeholder:text-slate-400">
            </div>
            <div>
                <label class="block text-xs font-black text-navy uppercase tracking-widest mb-3">
                    <i data-lucide="credit-card" class="w-4 h-4 inline-block mr-1 text-orange"></i> Payment Method
                </label>
                <div class="grid grid-cols-3 gap-3" id="on-payment-options">
                    <label class="on-payment-option cursor-pointer">
                        <input type="radio" name="on-payment" value="GCash" class="sr-only">
                        <div class="on-payment-card border-2 border-slate-100 rounded-2xl p-3 text-center transition-all hover:border-navy">
                            <div class="text-2xl mb-1">📱</div><p class="text-xs font-black text-navy">GCash</p>
                        </div>
                    </label>
                    <label class="on-payment-option cursor-pointer">
                        <input type="radio" name="on-payment" value="Maya" class="sr-only">
                        <div class="on-payment-card border-2 border-slate-100 rounded-2xl p-3 text-center transition-all hover:border-navy">
                            <div class="text-2xl mb-1">💳</div><p class="text-xs font-black text-navy">Maya</p>
                        </div>
                    </label>
                    <label class="on-payment-option cursor-pointer">
                        <input type="radio" name="on-payment" value="COD" class="sr-only">
                        <div class="on-payment-card border-2 border-slate-100 rounded-2xl p-3 text-center transition-all hover:border-navy">
                            <div class="text-2xl mb-1">💵</div><p class="text-xs font-black text-navy">Cash on Delivery</p>
                        </div>
                    </label>
                </div>
                <div id="on-ewallet-input" class="hidden mt-3">
                    <input type="text" id="on-ewallet-num" placeholder="e-wallet number (09XX XXX XXXX)"
                        class="w-full px-5 py-3.5 rounded-2xl border-2 border-slate-100 focus:border-navy focus:outline-none font-bold text-navy placeholder:font-normal placeholder:text-slate-400">
                </div>
            </div>
            <button id="on-place-btn" onclick="DirectOrder.placeOrder()" class="w-full py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-lg bg-navy text-white hover:bg-orange transition-colors">
                <i data-lucide="zap" class="w-5 h-5"></i> Place Order Now
            </button>
        </div>
    </div>
</div>
