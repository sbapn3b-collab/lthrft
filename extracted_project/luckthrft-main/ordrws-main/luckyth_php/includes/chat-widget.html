<div id="chat-root" class="fixed bottom-6 right-6 z-[90] flex flex-col items-end gap-3">

    <!-- Toggle button -->
    <button id="chat-toggle-btn" onclick="ChatWidget.toggle()"
        class="w-14 h-14 bg-navy hover:bg-slate-800 text-white rounded-full shadow-2xl flex items-center justify-center transition-all duration-300 relative">
        <i data-lucide="message-circle" class="w-6 h-6" id="chat-icon-open"></i>
        <i data-lucide="x"              class="w-6 h-6 hidden" id="chat-icon-close"></i>
        <span id="chat-unread-badge"
            class="hidden absolute -top-1 -right-1 w-5 h-5 bg-orange rounded-full text-[10px] font-black flex items-center justify-center">
            0
        </span>
    </button>

    <!-- Chat panel (above the button, order:-1 puts it above) -->
    <div id="chat-panel"
        class="hidden w-80 bg-white rounded-3xl shadow-2xl border-2 border-slate-100 overflow-hidden flex-col"
        style="height:440px; order:-1;">

        <!-- Header -->
        <div class="bg-navy text-white px-5 py-4 flex items-center gap-3 shrink-0">
            <div class="w-9 h-9 bg-orange rounded-full flex items-center justify-center shrink-0">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
            </div>
            <div>
                <p class="font-black text-sm leading-tight">LuckyThrift Support</p>
                <p class="text-[10px] text-slate-400">We reply as soon as we can</p>
            </div>
        </div>

        <!-- Messages -->
        <div id="chat-messages"
            class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar bg-slate-50 min-h-0">
        </div>

        <!-- Input -->
        <div id="chat-input-area" class="p-3 bg-white border-t-2 border-slate-100 shrink-0"></div>
    </div>
</div>

<script src="/assets/js/chat.js"></script>
