<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | LuckyThrift</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#003E7E', orange:'#F59231' } } } }</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden" data-page="cart">

<div id="global-loader" class="fixed inset-0 bg-white z-[999] flex items-center justify-center">
    <div class="text-center"><div class="loader-spin mx-auto mb-4"></div>
    <p class="text-navy font-black text-sm uppercase tracking-widest">Loading Cart…</p></div>
</div>

<div id="nav-placeholder"></div>
<div id="auth-placeholder"></div>
<div id="checkout-placeholder"></div>
<div id="toast-placeholder"></div>

<main class="pt-24 pb-20 max-w-4xl mx-auto px-4">

    <!-- ── CART ITEMS ────────────────────────────────── -->
    <div class="py-8">
        <div class="flex items-center justify-between mb-2">
            <h1 class="text-4xl font-black text-navy flex items-center gap-3">
                <i data-lucide="shopping-cart" class="text-orange w-8 h-8"></i> My Cart
            </h1>
            <a href="/shop.html" class="flex items-center gap-2 border-2 border-slate-200 hover:border-navy hover:bg-slate-50 text-navy px-4 py-2.5 rounded-xl font-bold text-sm transition-colors bg-white shadow-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Continue Shopping
            </a>
        </div>
        <p class="text-sm text-slate-400 font-bold mb-6">Check the items you want, then click Checkout.</p>

        <div class="bg-white rounded-[2.5rem] border-2 border-slate-100 p-8 shadow-sm">
            <div id="cart-list" class="space-y-3">
                <p class="text-slate-300 text-center font-bold py-6 animate-pulse">Loading your cart…</p>
            </div>
        </div>

        <!-- Checkout bar -->
        <div id="checkout-bar" class="hidden mt-4 bg-navy rounded-2xl px-6 py-4 flex items-center justify-between shadow-xl">
            <div>
                <p id="checkout-bar-count" class="text-white font-bold text-sm">Select items to checkout</p>
                <p id="checkout-bar-total" class="text-orange font-black text-xl"></p>
            </div>
            <button id="checkout-bar-btn" onclick="Checkout.open()" disabled
                class="bg-slate-200 text-slate-400 px-8 py-3 rounded-xl font-black text-sm flex items-center gap-2 cursor-not-allowed">
                <i data-lucide="credit-card" class="w-4 h-4"></i> Checkout
            </button>
        </div>
    </div>

    <!-- ── MY ORDERS ─────────────────────────────────── -->
    <div class="border-t border-slate-200 pt-8 pb-4">
        <h2 class="text-2xl font-black text-navy mb-6 flex items-center gap-3">
            <i data-lucide="clipboard-list" class="text-orange w-6 h-6"></i> My Orders
        </h2>
        <div class="bg-white rounded-[2.5rem] border-2 border-slate-100 p-8 shadow-sm">
            <div id="orders-list" class="space-y-3">
                <p class="text-slate-300 text-center font-bold py-6 animate-pulse">Loading orders…</p>
            </div>
        </div>
    </div>

    <!-- Tracking card (hidden until Track is clicked) -->
    <div id="tracking-card" class="hidden mt-8 bg-slate-50 border-2 border-navy rounded-[2.5rem] p-8 fade-in">
        <div class="flex justify-between items-center mb-8 pb-8 border-b border-slate-200">
            <div>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Order Status</span>
                <h4 class="text-3xl font-black text-navy uppercase" id="track-status">STATUS</h4>
            </div>
            <div class="text-right">
                <p class="font-black text-navy" id="track-id">ORD-XXXX</p>
                <p class="text-xs font-bold text-orange max-w-[180px] text-right" id="track-item">Item Name</p>
            </div>
        </div>
        <div id="track-timeline" class="space-y-6 relative pl-4 border-l-2 border-slate-200"></div>
    </div>

</main>

<script src="assets/js/api.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/page-cart.js"></script>
</body>
</html>
