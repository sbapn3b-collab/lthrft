<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | LuckyThrift Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#003E7E', orange:'#F59231' } } } }</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden" data-admin-page="inventory">

<div id="toast-placeholder"></div>

<div class="flex h-screen">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-8 custom-scrollbar">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-navy">Inventory Management</h1>
                <p class="text-sm text-slate-400 font-bold mt-1">Edit stock levels directly in the table below.</p>
            </div>
            <button id="refresh-btn" onclick="refreshInventory()" title="Refresh"
                class="flex items-center gap-2 bg-white border-2 border-slate-200 hover:border-navy text-navy px-4 py-2 rounded-xl font-bold text-sm transition-colors shadow-sm">
                <i data-lucide="refresh-cw" id="refresh-icon" class="w-4 h-4"></i> Refresh
            </button>
        </div>

        <div class="bg-white border-2 border-slate-100 rounded-3xl overflow-hidden shadow-sm">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Product</th>
                        <th class="px-6 py-4">Price</th>
                        <th class="px-6 py-4">Stock</th>
                        <th class="px-6 py-4 text-right">Status</th>
                    </tr>
                </thead>
                <tbody id="inventory-table" class="divide-y divide-slate-100">
                    <tr><td colspan="4" class="px-6 py-10 text-center text-slate-300 font-bold animate-pulse">Loading inventory…</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/page-admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    await loadInclude('sidebar-placeholder', '/includes/admin-sidebar.html');
    await loadInclude('toast-placeholder',   '/includes/toast.html');
    lucide.createIcons();
    document.addEventListener('pageReady', async () => {
        if (!Nav.user || Nav.user.role !== 'admin') { window.location.href = '/index.html'; return; }
        document.querySelectorAll('.admin-nav-btn[data-page]').forEach(a => {
            a.classList.toggle('active', a.dataset.page === 'inventory');
        });
        await loadInventory();
    });
});

async function loadInventory() {
    const tbody = document.getElementById('inventory-table');
    try {
        const data = await API.getProducts();
        tbody.innerHTML = data.products.map(p => `
            <tr class="hover:bg-slate-50">
                <td class="px-6 py-4">
                    <div class="flex items-center gap-4">
                        <img src="${p.images?.[0] || ''}" class="w-12 h-12 rounded-xl object-cover border border-slate-100">
                        <div>
                            <p class="font-bold text-navy">${p.name}</p>
                            <p class="text-xs text-slate-400">${(p.description || '').substring(0,55)}…</p>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-4 font-black text-navy">₱${p.price}</td>
                <td class="px-6 py-4">
                    <div class="flex items-center gap-2">
                        <input type="number" id="stock-${p.id}" value="${p.stock}" min="0"
                            class="w-20 px-3 py-2 border-2 border-slate-200 rounded-xl text-center font-bold focus:border-navy focus:outline-none">
                        <button onclick="saveStock(${p.id})"
                            class="text-xs font-bold bg-slate-100 hover:bg-green-500 hover:text-white px-3 py-2 rounded-xl transition-colors">
                            Save
                        </button>
                    </div>
                </td>
                <td class="px-6 py-4 text-right">
                    <span class="px-3 py-1 text-[10px] font-black uppercase rounded-full ${p.stock > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                        ${p.stock > 0 ? `${p.stock} in stock` : 'Sold Out'}
                    </span>
                </td>
            </tr>`).join('');
        lucide.createIcons();
    } catch(e) {
        tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-red-400 font-bold">Could not load inventory.</td></tr>`;
    }
}

async function saveStock(id) {
    const val = parseInt(document.getElementById(`stock-${id}`).value);
    try {
        await API.updateStock(id, val);
        showToast('Stock updated!', 'success');
        await loadInventory();
    } catch(e) { showToast(e.message, 'error'); }
}

async function refreshInventory() {
    const icon = document.getElementById('refresh-icon');
    const btn  = document.getElementById('refresh-btn');
    btn.disabled = true;
    icon.style.animation = 'spin 0.8s linear infinite';
    await loadInventory();
    icon.style.animation = '';
    btn.disabled = false;
}
</script>
<style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</body>
</html>
