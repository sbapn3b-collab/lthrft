<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | LuckyThrift Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#003E7E', orange:'#F59231' } } } }</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden" data-admin-page="analytics">

<div id="toast-placeholder"></div>

<div class="flex h-screen">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-8 custom-scrollbar">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-black text-navy">Analytics & Reports</h1>
            <button id="refresh-btn" onclick="refreshAnalytics()" title="Refresh"
                class="flex items-center gap-2 bg-white border-2 border-slate-200 hover:border-navy text-navy px-4 py-2 rounded-xl font-bold text-sm transition-colors shadow-sm">
                <i data-lucide="refresh-cw" id="refresh-icon" class="w-4 h-4"></i> Refresh
            </button>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="kpi-cards">
            <div class="bg-navy p-6 rounded-3xl text-white shadow-xl">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Total Revenue</p>
                <p class="text-3xl font-black" id="kpi-revenue">—</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 shadow-sm">
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Total Orders</p>
                <p class="text-3xl font-black text-navy" id="kpi-orders">—</p>
            </div>
            <div class="bg-orange p-6 rounded-3xl text-white shadow-sm">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-70 mb-2">Pending</p>
                <p class="text-3xl font-black" id="kpi-pending">—</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 shadow-sm">
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Customers</p>
                <p class="text-3xl font-black text-navy" id="kpi-customers">—</p>
            </div>
        </div>

        <!-- Top Products -->
        <div class="bg-white rounded-3xl border-2 border-slate-100 p-6">
            <h2 class="font-black text-navy text-lg mb-6 flex items-center gap-2">
                <i data-lucide="trending-up" class="text-orange w-5 h-5"></i> Top Selling Items
            </h2>
            <div id="top-products-list"><p class="text-slate-300 animate-pulse font-bold text-sm">Loading…</p></div>
        </div>
    </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/page-admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    await loadInclude('sidebar-placeholder', '/includes/admin-sidebar.html');
    await loadInclude('toast-placeholder',   '/includes/toast.html');
    lucide.createIcons();
    document.addEventListener('pageReady', async () => {
        if (!Nav.user || Nav.user.role !== 'admin') { window.location.href = '/index.html'; return; }
        document.querySelectorAll('.admin-nav-btn[data-page]').forEach(a => {
            a.classList.toggle('active', a.dataset.page === 'analytics');
        });
        await loadAnalytics();
    });
});

async function loadAnalytics() {
    try {
        const data = await API.getDashboard();
        document.getElementById('kpi-revenue').innerText   = '₱' + Number(data.revenue).toLocaleString();
        document.getElementById('kpi-orders').innerText    = data.total_orders;
        document.getElementById('kpi-pending').innerText   = data.pending;
        document.getElementById('kpi-customers').innerText = data.customers;
        document.getElementById('top-products-list').innerHTML = (data.top_products || []).map((p, i) => `
            <div class="flex items-center justify-between py-3 border-b border-slate-100 last:border-0">
                <div class="flex items-center gap-3">
                    <span class="w-8 h-8 bg-navy text-white rounded-full flex items-center justify-center text-xs font-black">${i+1}</span>
                    <span class="font-bold text-navy">${p.name}</span>
                </div>
                <span class="bg-orange/10 text-orange font-black text-sm px-4 py-1 rounded-full">${p.sold} sold</span>
            </div>`).join('') || '<p class="text-slate-400 text-sm">No sales data yet.</p>';
    } catch(e) { showToast('Error loading analytics.', 'error'); }
}

async function refreshAnalytics() {
    const icon = document.getElementById('refresh-icon');
    const btn  = document.getElementById('refresh-btn');
    btn.disabled = true;
    icon.style.animation = 'spin 0.8s linear infinite';
    await loadAnalytics();
    icon.style.animation = '';
    btn.disabled = false;
}
</script>
<style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</body>
</html>
