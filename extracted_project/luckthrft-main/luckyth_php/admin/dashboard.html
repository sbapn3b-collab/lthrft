<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | LuckyThrift Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#003E7E', orange:'#F59231' } } } }</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden" data-admin-page="dashboard">

<div id="toast-placeholder"></div>

<div class="flex h-screen">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-8 custom-scrollbar">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-black text-navy">System Overview</h1>
            <button id="refresh-btn" onclick="refreshDashboard()" title="Refresh"
                class="flex items-center gap-2 bg-white border-2 border-slate-200 hover:border-navy text-navy px-4 py-2 rounded-xl font-bold text-sm transition-colors shadow-sm">
                <i data-lucide="refresh-cw" id="refresh-icon" class="w-4 h-4"></i> Refresh
            </button>
        </div>

        <!-- Stat cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
            <div class="bg-navy p-8 rounded-3xl text-white shadow-xl col-span-2 md:col-span-1">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Total Revenue</p>
                <p class="text-4xl font-black" id="stat-revenue">—</p>
            </div>
            <div class="bg-white p-8 rounded-3xl border-2 border-slate-100 shadow-sm">
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Pending Orders</p>
                <p class="text-4xl font-black text-orange" id="stat-pending">—</p>
            </div>
            <div class="bg-white p-8 rounded-3xl border-2 border-slate-100 shadow-sm">
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Products</p>
                <p class="text-4xl font-black text-navy" id="stat-products">—</p>
            </div>
            <div class="bg-white p-8 rounded-3xl border-2 border-slate-100 shadow-sm">
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Customers</p>
                <p class="text-4xl font-black text-navy" id="stat-customers">—</p>
            </div>
        </div>

        <!-- Top products -->
        <div class="bg-white rounded-3xl border-2 border-slate-100 p-6">
            <h2 class="font-black text-navy text-lg mb-4 flex items-center gap-2">
                <i data-lucide="trending-up" class="text-orange w-5 h-5"></i> Top Selling Items
            </h2>
            <div id="stat-top-products"><p class="text-slate-300 animate-pulse font-bold text-sm">Loading…</p></div>
        </div>
    </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/page-admin.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await loadInclude('sidebar-placeholder', '/includes/admin-sidebar.html');
        await loadInclude('toast-placeholder',   '/includes/toast.html');
        lucide.createIcons();
        document.addEventListener('pageReady', async () => {
            if (!Nav.user || Nav.user.role !== 'admin') {
                window.location.href = '/index.html'; return;
            }
            document.querySelectorAll('.admin-nav-btn[data-page]').forEach(a => {
                a.classList.toggle('active', a.dataset.page === 'dashboard');
            });
            await loadDashboardStats();
        });
    });

    async function refreshDashboard() {
        const icon = document.getElementById('refresh-icon');
        const btn  = document.getElementById('refresh-btn');
        btn.disabled = true;
        icon.style.animation = 'spin 0.8s linear infinite';
        await loadDashboardStats();
        icon.style.animation = '';
        btn.disabled = false;
    }
</script>
<style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</body>
</html>
