<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90s Oversized Vintage Flannel | LuckyThrift</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#003E7E', orange:'#F59231' } } } }</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden" data-page="shop" data-product-id="4">

<div id="global-loader" class="fixed inset-0 bg-white z-[999] flex items-center justify-center">
    <div class="text-center"><div class="loader-spin mx-auto mb-4"></div>
    <p class="text-navy font-black text-sm uppercase tracking-widest">Loading…</p></div>
</div>

<div id="nav-placeholder"></div>
<div id="auth-placeholder"></div>
<div id="toast-placeholder"></div>
<div id="order-now-placeholder"></div>

<main class="pt-24 pb-20 max-w-5xl mx-auto px-4">

    <!-- Breadcrumb -->
    <nav class="flex items-center justify-between mb-8 pt-4">
        <div class="flex items-center gap-2 text-xs font-bold text-slate-400">
            <a href="/index.html" class="hover:text-navy">Home</a>
            <i data-lucide="chevron-right" class="w-3 h-3"></i>
            <a href="/shop.html" class="hover:text-navy">Storefront</a>
            <i data-lucide="chevron-right" class="w-3 h-3"></i>
            <span class="text-navy" id="prod-name">Product</span>
        </div>
        <a href="/shop.html" class="flex items-center gap-2 border-2 border-slate-200 hover:border-navy hover:bg-slate-50 text-navy px-4 py-2 rounded-xl font-bold text-sm transition-colors bg-white">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Storefront
        </a>
    </nav>

    <div id="product-content" class="bg-white rounded-[2.5rem] border-2 border-slate-100 shadow-sm overflow-hidden">
        <div class="flex flex-col md:flex-row">

            <!-- Image gallery -->
            <div class="w-full md:w-1/2 bg-slate-100 flex flex-col">
                <div class="relative h-72 md:h-[480px] overflow-hidden">
                    <img id="prod-main-img" src="" alt="Product" class="w-full h-full object-cover">
                    <button id="prev-btn" onclick="prevImage()" class="img-arrow hidden left-3"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                    <button id="next-btn" onclick="nextImage()" class="img-arrow hidden right-3"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                </div>
                <!-- Thumbnails -->
                <div id="prod-thumbs" class="flex gap-2 p-4 overflow-x-auto custom-scrollbar"></div>
            </div>

            <!-- Info -->
            <div class="w-full md:w-1/2 p-10 flex flex-col">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Vintage Collection</span>
                <h1 id="prod-name" class="text-3xl font-black text-navy mb-3"></h1>
                <div id="prod-stock-badge" class="mb-4"></div>
                <p id="prod-desc" class="text-slate-500 leading-relaxed text-sm flex-1 mb-8"></p>
                <div class="border-t border-slate-100 pt-8">
                    <div class="flex items-center justify-between mb-6">
                        <span id="prod-price" class="text-4xl font-black text-navy"></span>
                    </div>
                    <button id="add-to-cart-btn" class="w-full btn-primary py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2">
                        <i data-lucide="shopping-cart" class="w-5 h-5"></i> Add to Cart
                    </button>
                    <button id="order-now-btn" class="mt-6 w-full bg-navy text-white hover:bg-orange transition-colors py-3.5 rounded-2xl font-black text-base flex items-center justify-center gap-2">
                        <i data-lucide="zap" class="w-5 h-5"></i> Order Now
                    </button>
                </div>
            </div>
        </div>
    </div>

</main>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/page-product.js"></script>
</body>
</html>
