<!-- AUTH MODAL — included on every page -->
<div id="auth-modal" class="fixed inset-0 z-[100] modal-overlay hidden items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden fade-in relative p-10">
        <button onclick="Nav.closeAuth()" class="absolute top-6 right-6 p-2 text-slate-400 hover:text-navy rounded-full hover:bg-slate-100"><i data-lucide="x"></i></button>

        <!-- LOGIN -->
        <div id="login-container" class="block">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-navy/5 rounded-2xl flex items-center justify-center mx-auto mb-4"><i data-lucide="log-in" class="text-navy w-8 h-8"></i></div>
                <h2 class="text-3xl font-black text-navy">Welcome Back</h2>
            </div>
            <form onsubmit="Nav.login(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-navy uppercase tracking-widest mb-2">Username</label>
                    <input type="text" id="login-username" required autocomplete="username" class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-navy focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-black text-navy uppercase tracking-widest mb-2">Email</label>
                    <input type="email" id="login-email" required autocomplete="email" class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-navy focus:outline-none" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-xs font-black text-navy uppercase tracking-widest mb-2">Password</label>
                    <input type="password" id="login-password" required autocomplete="current-password" class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-navy focus:outline-none">
                </div>
                <button type="submit" class="w-full btn-primary py-4 rounded-2xl font-black text-lg">Sign In</button>
            </form>
            <p class="text-sm text-center font-bold text-slate-500 mt-6">
                New here? <span class="text-orange cursor-pointer hover:underline" onclick="Nav.toggleAuthMode('signup')">Create an Account</span>
            </p>
        </div>

        <!-- SIGN UP -->
        <div id="signup-container" class="hidden">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-orange/10 rounded-2xl flex items-center justify-center mx-auto mb-4"><i data-lucide="user-plus" class="text-orange w-8 h-8"></i></div>
                <h2 class="text-3xl font-black text-navy">Join LuckyThrift</h2>
            </div>
            <form onsubmit="Nav.register(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-black text-navy uppercase tracking-widest mb-2">Username</label>
                    <input type="text" id="reg-username" required minlength="3" class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-navy focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-black text-navy uppercase tracking-widest mb-2">Password <span class="font-normal text-slate-400">(min 6 chars)</span></label>
                    <input type="password" id="reg-password" required minlength="6" class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-navy focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-black text-navy uppercase tracking-widest mb-2">Email <span class="font-normal text-slate-400">(optional)</span></label>
                    <input type="email" id="reg-email" class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-navy focus:outline-none">
                </div>
                <button type="submit" class="w-full btn-primary py-4 rounded-2xl font-black text-lg">Create Account</button>
            </form>
            <p class="text-sm text-center font-bold text-slate-500 mt-6">
                Have an account? <span class="text-orange cursor-pointer hover:underline" onclick="Nav.toggleAuthMode('login')">Sign In</span>
            </p>
        </div>
    </div>
</div>
