<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auction | LuckyThrift</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#003E7E', orange:'#F59231' } } } }</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden" data-page="bids">

<div id="global-loader" class="fixed inset-0 bg-white z-[999] flex items-center justify-center">
    <div class="text-center"><div class="loader-spin mx-auto mb-4"></div>
    <p class="text-navy font-black text-sm uppercase tracking-widest">Loading Auction…</p></div>
</div>

<div id="nav-placeholder"></div>
<div id="auth-placeholder"></div>
<div id="toast-placeholder"></div>

<main class="pt-24 pb-20 max-w-6xl mx-auto px-4">

    <!-- BREADCRUMB -->
    <div class="flex items-center gap-2 text-sm font-bold text-slate-400 mb-8">
        <a href="/bids.html" class="hover:text-navy transition-colors">Auctions</a>
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
        <span id="breadcrumb-name" class="text-navy truncate max-w-xs">Loading…</span>
    </div>

    <div id="auction-detail" class="grid grid-cols-1 lg:grid-cols-2 gap-12">

        <!-- LEFT: Image gallery -->
        <div>
            <div class="relative aspect-[4/5] rounded-[2rem] overflow-hidden bg-slate-100 border-2 border-slate-100 shadow-sm">
                <img id="main-img" src="" alt="" class="w-full h-full object-cover">
                <div id="status-badge" class="absolute top-5 left-5"></div>
                <!-- Image nav arrows (shown only with multiple images) -->
                <button id="img-prev" class="img-arrow left-3 hidden" onclick="shiftImg(-1)"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                <button id="img-next" class="img-arrow right-3 hidden" onclick="shiftImg(1)"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                <div id="img-counter" class="hidden absolute bottom-4 right-4 bg-black/40 text-white text-xs font-black px-3 py-1 rounded-full"></div>
            </div>
            <!-- Thumbnails -->
            <div id="thumbnails" class="flex gap-3 mt-4 overflow-x-auto hide-scrollbar pb-1"></div>
        </div>

        <!-- RIGHT: Auction details -->
        <div class="flex flex-col gap-6">

            <!-- Category + Name -->
            <div>
                <span id="detail-category" class="text-xs font-black uppercase tracking-widest text-orange"></span>
                <h1 id="detail-name" class="text-3xl font-black text-navy mt-1 leading-tight"></h1>
            </div>

            <!-- Countdown timer -->
            <div id="timer-block" class="hidden bg-navy text-white rounded-2xl p-5">
                <p id="timer-label" class="text-xs font-black uppercase tracking-widest text-slate-300 mb-2"></p>
                <div id="timer-display" class="flex gap-4 text-center">
                    <div><div id="t-days"    class="text-3xl font-black leading-none">--</div><div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mt-1">Days</div></div>
                    <div class="text-3xl font-black text-slate-500">:</div>
                    <div><div id="t-hours"   class="text-3xl font-black leading-none">--</div><div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mt-1">Hrs</div></div>
                    <div class="text-3xl font-black text-slate-500">:</div>
                    <div><div id="t-mins"    class="text-3xl font-black leading-none">--</div><div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mt-1">Min</div></div>
                    <div class="text-3xl font-black text-slate-500">:</div>
                    <div><div id="t-secs"    class="text-3xl font-black leading-none">--</div><div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mt-1">Sec</div></div>
                </div>
            </div>

            <!-- Bid info panel -->
            <div class="bg-white border-2 border-slate-100 rounded-2xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <p class="text-xs font-black uppercase tracking-widest text-slate-400 mb-1" id="bid-label">Starting Price</p>
                        <p id="current-bid-display" class="text-4xl font-black text-navy">₱—</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-black uppercase tracking-widest text-slate-400 mb-1">Bid Increment</p>
                        <p id="increment-display" class="text-xl font-black text-slate-600">+₱—</p>
                    </div>
                </div>
                <div id="bid-action-area">
                    <!-- filled by JS based on auction status -->
                </div>
            </div>

            <!-- Description -->
            <div class="bg-white border-2 border-slate-100 rounded-2xl p-6">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-3">Description</h3>
                <p id="detail-description" class="text-slate-600 font-medium leading-relaxed"></p>
            </div>

            <!-- Bid history -->
            <div class="bg-white border-2 border-slate-100 rounded-2xl p-6">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Bid History</h3>
                <div id="bid-history" class="space-y-2 text-sm max-h-52 overflow-y-auto custom-scrollbar">
                    <p class="text-slate-300 font-bold text-center py-4">No bids yet — be the first!</p>
                </div>
            </div>

        </div>
    </div>

</main>

<script src="assets/js/api.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/page-bid-item.js"></script>
</body>
</html>
