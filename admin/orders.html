<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fulfillment | LuckyThrift Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#003E7E', orange:'#F59231' } } } }</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden" data-admin-page="orders">

<div id="toast-placeholder"></div>

<div class="flex h-screen">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-8 custom-scrollbar">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-navy">Order Fulfillment Ledger</h1>
                <p class="text-sm text-slate-400 font-bold mt-1">Ship orders once dispatched, then mark as Delivered once received by customer.</p>
            </div>
            <button id="refresh-btn" onclick="refreshOrders()" title="Refresh"
                class="flex items-center gap-2 bg-white border-2 border-slate-200 hover:border-navy text-navy px-4 py-2 rounded-xl font-bold text-sm transition-colors shadow-sm">
                <i data-lucide="refresh-cw" id="refresh-icon" class="w-4 h-4"></i> Refresh
            </button>
        </div>

        <div class="bg-white border-2 border-slate-100 rounded-3xl overflow-x-auto shadow-sm">
            <table class="w-full text-left min-w-[900px]">
                <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Order ID</th>
                        <th class="px-6 py-4">Customer</th>
                        <th class="px-6 py-4">Items</th>
                        <th class="px-6 py-4">Amount</th>
                        <th class="px-6 py-4">Delivery</th>
                        <th class="px-6 py-4">Payment</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="orders-table" class="divide-y divide-slate-100">
                    <tr><td colspan="8" class="px-6 py-10 text-center text-slate-300 font-bold animate-pulse">Loading orders…</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/page-admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    await loadInclude('sidebar-placeholder', '/includes/admin-sidebar.html');
    await loadInclude('toast-placeholder',   '/includes/toast.html');
    lucide.createIcons();
    document.addEventListener('pageReady', async () => {
        if (!Nav.user || Nav.user.role !== 'admin') { window.location.href = '/index.html'; return; }
        document.querySelectorAll('.admin-nav-btn[data-page]').forEach(a => {
            a.classList.toggle('active', a.dataset.page === 'orders');
        });
        await loadOrders();
    });
});

async function loadOrders() {
    const tbody = document.getElementById('orders-table');
    try {
        const data = await API.adminGetOrders();
        if (!data.orders.length) {
            tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-10 text-center text-slate-400 font-bold">No orders yet.</td></tr>`;
            return;
        }
        const statusClass = {
            Pending:   'bg-orange text-white',
            Processing:'bg-blue-500 text-white',
            Shipped:   'bg-navy text-white',
            Delivered: 'bg-green-500 text-white',
            Cancelled: 'bg-slate-300 text-slate-600'
        };
        tbody.innerHTML = data.orders.map(o => `
            <tr class="hover:bg-slate-50">
                <td class="px-6 py-4 font-mono text-xs font-bold text-slate-500">#${o.id}</td>
                <td class="px-6 py-4 font-bold text-navy">${o.customer}</td>
                <td class="px-6 py-4 max-w-[180px]">
                    ${o.items.map(i => `<span class="block text-xs">${i.name} <span class="text-slate-400">₱${i.price}</span></span>`).join('')}
                </td>
                <td class="px-6 py-4 font-black text-navy">₱${Number(o.total_amount).toLocaleString()}</td>
                <td class="px-6 py-4 text-xs text-slate-500 max-w-[160px]">${o.delivery_addr || '—'}</td>
                <td class="px-6 py-4 text-xs font-bold">
                    ${o.payment_method || '—'}
                    ${o.ewallet_num ? `<br><span class="text-slate-400">${o.ewallet_num}</span>` : ''}
                </td>
                <td class="px-6 py-4">
                    <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${statusClass[o.status] || 'bg-slate-200'}">
                        ${o.status}
                    </span>
                </td>
                <td class="px-6 py-4 text-right">
                    ${o.status === 'Pending' || o.status === 'Processing'
                        ? `<button onclick="shipOrder(${o.id})" class="text-xs font-bold bg-orange text-white px-4 py-2 rounded-xl hover:bg-navy transition-colors">Ship</button>`
                        : o.status === 'Shipped'
                        ? `<button onclick="deliverOrder(${o.id})" class="text-xs font-bold bg-green-500 text-white px-4 py-2 rounded-xl hover:bg-green-700 transition-colors flex items-center gap-1 ml-auto"><i data-lucide="package-check" class="w-3 h-3"></i> Delivered</button>`
                        : `<span class="text-xs font-bold text-slate-400">${o.status}</span>`}
                </td>
            </tr>`).join('');
        lucide.createIcons();
    } catch(e) {
        tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-10 text-center text-red-400 font-bold">Could not load orders.</td></tr>`;
    }
}

async function shipOrder(id) {
    try {
        await API.shipOrder(id);
        showToast(`Order #${id} marked as Shipped.`, 'success');
        await loadOrders();
    } catch(e) { showToast(e.message, 'error'); }
}

async function deliverOrder(id) {
    try {
        await API.deliverOrder(id);
        showToast(`Order #${id} marked as Delivered!`, 'success');
        await loadOrders();
    } catch(e) { showToast(e.message, 'error'); }
}

async function refreshOrders() {
    const icon = document.getElementById('refresh-icon');
    const btn  = document.getElementById('refresh-btn');
    btn.disabled = true;
    icon.style.animation = 'spin 0.8s linear infinite';
    await loadOrders();
    icon.style.animation = '';
    btn.disabled = false;
}
</script>
<style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</body>
</html>
