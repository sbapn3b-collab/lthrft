<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bids | LuckyThrift</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { navy:'#003E7E', orange:'#F59231' } } } }</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden" data-page="bids">

<div id="global-loader" class="fixed inset-0 bg-white z-[999] flex items-center justify-center">
    <div class="text-center"><div class="loader-spin mx-auto mb-4"></div>
    <p class="text-navy font-black text-sm uppercase tracking-widest">Loading Auctions…</p></div>
</div>

<div id="nav-placeholder"></div>
<div id="auth-placeholder"></div>
<div id="toast-placeholder"></div>

<main class="pt-24 pb-20 max-w-7xl mx-auto px-4">

    <div class="py-8 mb-4">
        <p class="text-xs font-black uppercase tracking-widest text-orange mb-1">LuckyThrift</p>
        <h1 class="text-4xl font-black text-navy">Live Auctions</h1>
        <p class="text-slate-400 text-sm mt-1">Bid on one-of-a-kind vintage pieces. Every item is unique.</p>
    </div>

    <!-- LIVE NOW -->
    <section id="section-live" class="mb-14 hidden">
        <div class="flex items-center gap-3 mb-6">
            <span class="flex items-center gap-2 bg-green-500 text-white text-xs font-black px-3 py-1.5 rounded-full uppercase tracking-wider">
                <span class="w-2 h-2 rounded-full bg-white animate-pulse inline-block"></span> Live Now
            </span>
            <span id="live-count" class="text-sm text-slate-400 font-bold"></span>
        </div>
        <div id="grid-live" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- COMING SOON -->
    <section id="section-scheduled" class="mb-14 hidden">
        <div class="flex items-center gap-3 mb-6">
            <span class="flex items-center gap-2 bg-orange/10 text-orange text-xs font-black px-3 py-1.5 rounded-full uppercase tracking-wider">
                <i data-lucide="clock" class="w-3.5 h-3.5"></i> Coming Soon
            </span>
            <span id="scheduled-count" class="text-sm text-slate-400 font-bold"></span>
        </div>
        <div id="grid-scheduled" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- RECENTLY ENDED -->
    <section id="section-ended" class="mb-14 hidden">
        <div class="flex items-center gap-3 mb-6">
            <span class="flex items-center gap-2 bg-slate-200 text-slate-500 text-xs font-black px-3 py-1.5 rounded-full uppercase tracking-wider">
                <i data-lucide="archive" class="w-3.5 h-3.5"></i> Recently Ended
            </span>
        </div>
        <div id="grid-ended" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 opacity-70"></div>
    </section>

    <!-- EMPTY STATE -->
    <div id="empty-state" class="hidden text-center py-24">
        <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="gavel" class="w-9 h-9 text-slate-300"></i>
        </div>
        <h2 class="text-2xl font-black text-navy mb-2">No Auctions Yet</h2>
        <p class="text-slate-400 font-medium">Check back soon — new auctions drop every week.</p>
        <a href="/shop.html" class="inline-block mt-6 bg-navy text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-800 transition-colors">Browse Storefront</a>
    </div>

</main>

<script src="assets/js/api.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/page-bids.js"></script>
</body>
</html>
